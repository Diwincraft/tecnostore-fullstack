<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Editar Producto</title>

    <!-- Bootstrap -->

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

</head>

<body class="bg-light">

    <div class="container py-5">

        <div class="col-md-6 mx-auto">

            <div class="card shadow border-0">

                <div class="card-body p-4">

                    <h2 class="mb-4 text-center">

                        Editar Producto

                    </h2>

                    <!-- FORMULARIO -->

                    <form
                        method="POST"
                        enctype="multipart/form-data">

                        <!-- NOMBRE -->

                        <div class="mb-3">

                            <label class="form-label">

                                Nombre

                            </label>

                            <input
                                type="text"
                                name="nombre"
                                class="form-control"
                                value="{{ producto.nombre }}"
                                required>

                        </div>

                        <!-- PRECIO -->

                        <div class="mb-3">

                            <label class="form-label">

                                Precio

                            </label>

                            <input
                                type="number"
                                name="precio"
                                class="form-control"
                                value="{{ producto.precio }}"
                                required>

                        </div>

                        <!-- CATEGORÍA -->

                        <div class="mb-3">

                            <label class="form-label">

                                Categoría

                            </label>

                            <input
                                type="text"
                                name="categoria"
                                class="form-control"
                                value="{{ producto.categoria }}"
                                required>

                        </div>

                        <!-- IMAGEN ACTUAL -->

                        <div class="mb-3 text-center">

                            <label class="form-label d-block">

                                Imagen actual

                            </label>

                            <img
                                src="{{ url_for('static', filename='uploads/' + producto.imagen) }}"
                                width="200"
                                class="img-fluid rounded shadow">

                        </div>

                        <!-- NUEVA IMAGEN -->

                        <div class="mb-4">

                            <label class="form-label">

                                Cambiar imagen (opcional)

                            </label>

                            <input
                                type="file"
                                name="imagen"
                                class="form-control"
                                accept="image/*">

                        </div>

                        <!-- BOTONES -->

                        <div class="d-flex gap-2">

                            <a
                                href="/admin"
                                class="btn btn-secondary w-50">

                                Volver

                            </a>

                            <button
                                type="submit"
                                class="btn btn-warning w-50">

                                Actualizar producto

                            </button>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

</body>

</html>
