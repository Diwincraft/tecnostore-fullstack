<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <title>Agregar Producto</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

    <div class="container py-5">

        <div class="col-md-6 mx-auto">

            <div class="card shadow">

                <div class="card-body">

                    <h2 class="mb-4">

                        Nuevo Producto

                    </h2>

                    <form method="POST" enctype="multipart/form-data">

                        <div class="mb-3">

                            <label class="form-label">

                                Nombre

                            </label>

                            <input 
                                 type="file"
                                 name="imagen"
                                 class="form-control"
                                 required>
                        </div>

                        <div class="mb-3">

                            <label class="form-label">

                                Precio

                            </label>

                            <input 
                                type="number"
                                name="precio"
                                class="form-control"
                                required>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">

                                Categoría

                            </label>

                            <input 
                                type="text"
                                name="categoria"
                                class="form-control"
                                required>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">

                                URL Imagen

                            </label>

                            <input 
                                type="text"
                                name="imagen"
                                class="form-control"
                                required>

                        </div>

                        <button class="btn btn-success w-100">

                            Guardar producto

                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

</body>

</html>
